name: build love2d android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout game
        uses: actions/checkout@v4
        with:
          path: game
          ref: 1.0.1
          submodules: recursive

      - name: clone love-android
        run: |
          git clone --recurse-submodules \
            https://github.com/love2d/love-android love-android

      - name: set up jdk 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: set up android ndk r25c
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c
          add-to-path: false

      - name: copy game files into assets
        run: |
          ASSETS=love-android/app/src/main/assets
          mkdir -p "$ASSETS"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='art' \
            game/ "$ASSETS/"

      - name: patch gameactivity for file picker callback
        run: |
          python3 - << 'PYEOF'
          ACTIVITY = "love-android/app/src/main/java/org/love2d/android/GameActivity.java"
          with open(ACTIVITY, "r") as f:
              code = f.read()

          result_code = """
              @Override
              protected void onActivityResult(int requestCode, int resultCode, android.content.Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (requestCode == 42 && resultCode == RESULT_OK && data != null) {
                      android.net.Uri uri = data.getData();
                      try {
                          java.io.InputStream in = getContentResolver().openInputStream(uri);
                          java.io.File outFile = new java.io.File(getExternalFilesDir(null), "save/pending_mod.zip");
                          outFile.getParentFile().mkdirs();
                          java.io.FileOutputStream out = new java.io.FileOutputStream(outFile);
                          byte[] buffer = new byte[1024];
                          int read;
                          while ((read = in.read(buffer)) != -1) {
                              out.write(buffer, 0, read);
                          }
                          in.close();
                          out.flush();
                          out.close();
                          final String finalPath = outFile.getAbsolutePath();
                          runOnUiThread(new Runnable() {
                              @Override
                              public void run() {
                                  org.libsdl.app.SDLActivity.onNativeDropFile(finalPath);
                              }
                          });
                      } catch (Exception e) {
                          e.printStackTrace();
                      }
                  }
              }
          """

          code = code[:code.rfind("}")] + result_code + "\n}"
          with open(ACTIVITY, "w") as f:
              f.write(code)
          print("gameactivity patched ok")
          PYEOF

      - name: build debug apk
        working-directory: love-android
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          chmod +x gradlew
          ./gradlew assembleEmbedNoRecordDebug --no-daemon --stacktrace

      - name: upload apk
        uses: actions/upload-artifact@v4
        with:
          name: fnf-love-android-${{ github.sha }}
          path: love-android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
