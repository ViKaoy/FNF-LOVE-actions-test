name: build love2d android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout game
        uses: actions/checkout@v4
        with:
          path: game
          ref: 1.0.1
          submodules: recursive

      - name: clone love-android
        run: |
          git clone --recurse-submodules \
            https://github.com/love2d/love-android love-android

      - name: set up jdk 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: set up android ndk r25c
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c
          add-to-path: false

      - name: copy game files into assets
        run: |
          ASSETS=love-android/app/src/main/assets
          mkdir -p "$ASSETS"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='art' \
            game/ "$ASSETS/"

      - name: patch androidmanifest
        run: |
          python3 - << 'PYEOF'
          import xml.etree.ElementTree as ET

          MANIFEST = "love-android/app/src/main/AndroidManifest.xml"
          ET.register_namespace("android", "http://schemas.android.com/apk/res/android")

          tree = ET.parse(MANIFEST)
          root = tree.getroot()
          NS = "http://schemas.android.com/apk/res/android"

          existing = {el.get(f"{{{NS}}}name") for el in root.findall("uses-permission")}

          perms = [
              {"android:name": "android.permission.READ_EXTERNAL_STORAGE",
               "android:maxSdkVersion": "32"},
              {"android:name": "android.permission.WRITE_EXTERNAL_STORAGE",
               "android:maxSdkVersion": "29"},
              {"android:name": "android.permission.MANAGE_EXTERNAL_STORAGE"},
          ]

          insert_at = list(root).index(root.find("application"))
          for i, attrs in enumerate(perms):
              name = attrs["android:name"]
              if name not in existing:
                  el = ET.Element("uses-permission")
                  for k, v in attrs.items():
                      el.set(k.replace("android:", f"{{{NS}}}"), v)
                  root.insert(insert_at + i, el)

          app = root.find("application")
          app.set(f"{{{NS}}}requestLegacyExternalStorage", "true")

          tree.write(MANIFEST, xml_declaration=True, encoding="utf-8")
          print("manifest patched ok")
          PYEOF

      - name: build debug apk
        working-directory: love-android
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          chmod +x gradlew
          ./gradlew assembleEmbedNoRecordDebug --no-daemon --stacktrace

      - name: upload apk
        uses: actions/upload-artifact@v4
        with:
          name: fnf-love-android-${{ github.sha }}
          path: love-android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
